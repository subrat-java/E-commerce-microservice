services:

  service-registry:
    build: ./Service-Registry/Service-Registry
    ports:
      - "8761:8761"

  api-gateway:
    build: ./Api-Gateway/Api-Gateway
    ports:
      - "9090:9090"
    depends_on:
      - service-registry

  product-service:
    build: ./Product-Service/Product-Service
    ports:
      - "8081:8081"
    depends_on:
      - service-registry

  order-service:
    build: ./order-service/order-service
    ports:
      - "8082:8082"
    depends_on:
      - service-registry

  user-service:
    build: ./user-service/user-service
    ports:
      - "8083:8083"
    depends_on:
      - service-registry